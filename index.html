<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Dino Runner</title>
  <meta name="theme-color" content="#f7f7f7">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="engine.css">
  <link rel="stylesheet" href="brand.css">
</head>

<body class="offline">

  <main class="stage">
    <div class="hud">
      <span class="title">Dino Runner</span>
      <span class="hint">Space / &#8593; jump &nbsp;&#183;&nbsp; &#8595; duck</span>
    </div>

    <div class="interstitial-wrapper">
      <div class="overlay" id="start">
        <p>Press <b>Space</b> or tap to start</p>
      </div>
      <div class="overlay hidden" id="over">
        <h2>Game over</h2>
        <p>Distance: <b id="final-score">00000</b></p>
        <button class="btn" id="replay">Play again</button>
      </div>
    </div>

    <!-- Engine expects this element (hidden); init() sets its visibility. -->
    <div class="icon icon-offline" aria-hidden="true"></div>

    <!-- Chrome dino sprite sheets via CDN. -->
    <div id="offline-resources">
      <img id="offline-resources-1x" alt=""
           src="https://cdn.jsdelivr.net/gh/wayou/t-rex-runner@gh-pages/assets/default_100_percent/100-offline-sprite.png">
      <img id="offline-resources-2x" alt=""
           src="https://cdn.jsdelivr.net/gh/wayou/t-rex-runner@gh-pages/assets/default_200_percent/200-offline-sprite.png">
      <template id="audio-resources">
        <audio id="offline-sound-press"></audio>
        <audio id="offline-sound-hit"></audio>
        <audio id="offline-sound-reached"></audio>
      </template>
    </div>
  </main>

  <script src="engine.js"></script>
  <script src="boot.js"></script>
</body>
</html>
